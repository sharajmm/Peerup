<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="500" height="400" fill="url(#grad1)" rx="20" ry="20"/>
  
  <!-- People -->
  <circle cx="150" cy="150" r="50" fill="#6366f1" opacity="0.8"/>
  <circle cx="350" cy="150" r="50" fill="#ec4899" opacity="0.8"/>
  
  <!-- Person 1 silhouette -->
  <circle cx="150" cy="120" r="20" fill="#fff"/>
  <path d="M110,190 C110,160 130,140 150,140 C170,140 190,160 190,190" fill="#fff"/>
  
  <!-- Person 2 silhouette -->
  <circle cx="350" cy="120" r="20" fill="#fff"/>
  <path d="M310,190 C310,160 330,140 350,140 C370,140 390,160 390,190" fill="#fff"/>
  
  <!-- Connection line -->
  <line x1="190" y1="150" x2="310" y2="150" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="10,5"/>
  
  <!-- Knowledge bubbles -->
  <circle cx="200" cy="130" r="10" fill="#10b981" opacity="0.8"/>
  <circle cx="230" cy="110" r="15" fill="#6366f1" opacity="0.6"/>
  <circle cx="260" cy="140" r="8" fill="#ec4899" opacity="0.7"/>
  <circle cx="280" cy="120" r="12" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="300" cy="140" r="10" fill="#10b981" opacity="0.6"/>
  
  <!-- Book -->
  <rect x="200" y="250" width="100" height="80" fill="#fff" rx="5" ry="5"/>
  <rect x="210" y="260" width="80" height="10" fill="#6366f1" opacity="0.5"/>
  <rect x="210" y="280" width="80" height="10" fill="#6366f1" opacity="0.5"/>
  <rect x="210" y="300" width="50" height="10" fill="#6366f1" opacity="0.5"/>
  
  <!-- Laptop -->
  <rect x="100" y="250" width="80" height="60" fill="#fff" rx="5" ry="5"/>
  <rect x="90" y="310" width="100" height="10" fill="#64748b"/>
  <circle cx="140" cy="305" r="2" fill="#64748b"/>
  
  <!-- Mobile -->
  <rect x="330" y="260" width="40" height="70" fill="#fff" rx="5" ry="5"/>
  <rect x="335" y="270" width="30" height="40" fill="#f1f5f9"/>
  <circle cx="350" cy="320" r="5" fill="#f1f5f9"/>
</svg>
